apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: selfsigned-issuer
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: wildcard-arch-local
  namespace: istio-system
spec:
  secretName: wildcard-arch-local-tls
  commonName: "*.arch.local"
  dnsNames:
    - "*.arch.local"
  issuerRef:
    name: selfsigned-issuer
    kind: ClusterIssuer
