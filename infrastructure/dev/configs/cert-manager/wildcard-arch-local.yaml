---
# bootstrap issuer (only used to sign the CA cert)
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: selfsigned-issuer
spec:
  selfSigned: {}
---
# root CA certificate
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: arch-local-ca
  namespace: cert-manager
spec:
  isCA: true
  commonName: "arch.local CA"
  secretName: arch-local-ca-tls
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: selfsigned-issuer
    kind: ClusterIssuer
---
# CA-backed issuer
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: arch-local-ca-issuer
spec:
  ca:
    secretName: arch-local-ca-tls
---
# wildcard cert signed by the CA
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: wildcard-arch-local
  namespace: istio-system
spec:
  secretName: wildcard-arch-local-tls
  commonName: "*.arch.local"
  dnsNames:
    - "*.arch.local"
  issuerRef:
    name: arch-local-ca-issuer
    kind: ClusterIssuer
