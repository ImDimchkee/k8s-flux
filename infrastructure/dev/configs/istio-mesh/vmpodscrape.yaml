apiVersion: operator.victoriametrics.com/v1beta1
kind: VMPodScrape
metadata:
  name: istio-gateway
  namespace: istio-system
spec:
  selector:
    matchLabels:
      istio: gateway
  namespaceSelector:
    matchNames:
      - istio-system
  podMetricsEndpoints:
    - port: http-envoy-prom
      path: /stats/prometheus
      interval: 30s
      relabelConfigs:
        - targetLabel: job
          replacement: istio-gateway
