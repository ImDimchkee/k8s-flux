---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - namespace.yaml
  - repository.yaml
  - release.yaml
  - dashboards

patches:
  - target:
      kind: HelmRelease
      name: grafana
    patch: |
      - op: replace
        path: /spec/chart/spec/version
        value: "10.7.x"
