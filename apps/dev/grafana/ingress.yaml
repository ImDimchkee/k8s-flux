apiVersion: networking.istio.io/v1
kind: Gateway
metadata:
  name: grafana
  namespace: grafana
spec:
  selector:
    istio: ingressgateway
  servers:
    - port:
        number: 80
        name: http
        protocol: HTTP
      hosts:
        - "*"
---
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: grafana
  namespace: grafana
spec:
  hosts:
    - "grafana.arch.local"
  gateways:
    - grafana
  http:
    - route:
        - destination:
            host: grafana.grafana.svc.cluster.local
            port:
              number: 80